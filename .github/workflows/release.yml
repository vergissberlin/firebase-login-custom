# Runs once per release: only on tag push (Release Please pushes the tag after merging the release PR).
# Not triggered by release:published to avoid running twice for the same version.
# Order: checkout → setup → install → build → check if on npm → publish (if not) → create GitHub Release.
name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual run (e.g. "First publish to npm" or "Republish after fixing NPM_TOKEN")'
        required: false
        default: 'Manual trigger'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      HUSKY: '0'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '25.x'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Check if version already published
        id: npm_check
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view firebase-login-custom@$VERSION version 2>/dev/null; then
            echo "already_published=true" >> $GITHUB_OUTPUT
            echo "Version $VERSION is already on npm, skipping publish."
          else
            echo "already_published=false" >> $GITHUB_OUTPUT
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to npm
        if: steps.npm_check.outputs.already_published != 'true'
        run: |
          for i in 1 2 3; do
            pnpm publish --access public --no-git-checks && break
            if [ $i -lt 3 ]; then echo "Publish failed, retrying in 15s..."; sleep 15; else exit 1; fi
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
